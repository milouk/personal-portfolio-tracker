name: Deploy demo to gh-pages

# Builds the static demo and pushes it to the `gh-pages` branch of THIS repo.
# milouk.github.io's build step (scripts/sync-demos.mjs) clones that branch
# and serves it at https://milouk.me/projects/portfolio/.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "demo/**"
      - "next.config.ts"
      - "package.json"
      - "package-lock.json"
      - "scripts/build-demo.ts"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build demo (static export)
        env:
          BASE_PATH: /projects/portfolio
        run: npm run demo:build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: ${{ github.sha }}"

      - name: Trigger personal site rebuild
        if: success()
        run: |
          echo "::notice::Demo published. Trigger https://github.com/milouk/milouk.github.io to rebuild and pull the latest demo into /projects/portfolio/."
