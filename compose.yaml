# Personal Portfolio Tracker — single-container deployment.
#
# ┌─ Quick start ────────────────────────────────────────────────────────────┐
# │   cp .env.example .env.local       # fill in the vars you need           │
# │   docker compose up -d             # dashboard at http://localhost:3000  │
# └──────────────────────────────────────────────────────────────────────────┘
#
# ┌─ One-time broker logins (interactive) ───────────────────────────────────┐
# │   docker compose run --rm app pytr login    # Trade Republic (SMS / push)│
# │   docker compose exec app npm run sync:nbg  # NBG (Viber OTP)            │
# └──────────────────────────────────────────────────────────────────────────┘
#
# ┌─ Periodic sync (host crontab) ───────────────────────────────────────────┐
# │   0 8 * * *  docker compose -f /path/to/compose.yaml exec -T app \       │
# │              npm run sync:all                                            │
# └──────────────────────────────────────────────────────────────────────────┘
#
# ┌─ Passing env vars (any of these work, in priority order) ────────────────┐
# │   1. shell env when invoking compose:                                    │
# │        PORTFOLIO_API_TOKEN=xxx docker compose up -d                      │
# │   2. .env file in the same dir as compose.yaml (auto-loaded by compose)  │
# │   3. .env.local file (loaded into the container via `env_file` below)    │
# │   4. `environment:` block overrides below                                │
# └──────────────────────────────────────────────────────────────────────────┘

services:
  app:
    # Pulled from GitHub Container Registry by default — version pin via
    # APP_TAG (e.g. v1.2.3) or leave at `latest`. Images are public, so no
    # `docker login` is required to pull.
    image: ${APP_IMAGE:-ghcr.io/milouk/personal-portfolio-tracker}:${APP_TAG:-latest}
    # Local fallback: `docker compose build` (or `up --build`) compiles the
    # Dockerfile in this directory. Useful when you've patched the source.
    build: .
    container_name: portfolio-tracker
    restart: unless-stopped
    # Pull a fresh image when one is available — pair with `docker compose pull`
    # or watchtower / a cron job to upgrade automatically.
    pull_policy: missing
    # All known config keys can be passed via .env.local — see .env.example for
    # the full list (NBG_*, TR_*, SMTP_*, NTFY_*, PORTFOLIO_API_TOKEN).
    env_file:
      - path: .env.local
        required: false
    environment:
      # Explicit overrides — uncomment what you need, or set in your shell.
      # Anything left unset falls back to the value in .env.local (if any).
      NODE_ENV: production
      # NBG sync
      NBG_USERNAME: ${NBG_USERNAME:-}
      NBG_PASSWORD: ${NBG_PASSWORD:-}
      NBG_MAPPINGS: ${NBG_MAPPINGS:-}
      NBG_OTP_SOURCE: ${NBG_OTP_SOURCE:-manual}
      NBG_OTP_PORT: ${NBG_OTP_PORT:-4848}
      # Trade Republic sync
      TR_PHONE_NUMBER: ${TR_PHONE_NUMBER:-}
      TR_PIN: ${TR_PIN:-}
      # Notifications
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      NOTIFY_EMAIL_FROM: ${NOTIFY_EMAIL_FROM:-}
      NOTIFY_EMAIL_TO: ${NOTIFY_EMAIL_TO:-}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.sh}
      # API auth — required when exposing beyond localhost.
      PORTFOLIO_API_TOKEN: ${PORTFOLIO_API_TOKEN:-}
    ports:
      - "3000:3000"
      # Uncomment to expose the NBG OTP webhook port for remote OTP delivery
      # (when running headless / no TTY available for stdin prompt).
      # - "4848:4848"
    volumes:
      # Portfolio data (portfolio.json, events.jsonl, NBG browser profile, caches).
      - ./data:/app/data
      # pytr persists its session / cookies under $HOME/.pytr — and HOME=/data
      # in the image, so this volume keeps you logged in across restarts.
      - pytr-home:/data
    deploy:
      resources:
        limits:
          # Sync scripts spawn Chromium (NBG) — give it some headroom.
          memory: 1G

volumes:
  pytr-home:
